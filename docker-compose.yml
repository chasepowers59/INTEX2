services:
  api:
    build:
      context: .
      dockerfile: api/Intex.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__AppDb: "Server=host.docker.internal,1433;Database=intex2db;User Id=YOUR_SQL_USER;Password=YOUR_SQL_PASSWORD;TrustServerCertificate=True;Encrypt=True;"
      Jwt__Issuer: "Intex.Api"
      Jwt__Audience: "Intex.Web"
      Jwt__Key: "REPLACE_WITH_32_PLUS_CHAR_RANDOM_SECRET"
      Cors__AllowedOrigins__0: "http://localhost:5173"
      Database__AutoMigrate: "false"
      LighthouseImport__AutoImportIfEmpty: "false"
    ports:
      - "8080:8080"

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
      args:
        VITE_API_BASE_URL: "http://localhost:8080"
    depends_on:
      - api
    ports:
      - "5173:80"

name: Azure App Service API CI/CD

on:
  push:
    branches:
      - main
    paths:
      - "api/**"
      - ".github/workflows/azure-app-service-intex2-api.yml"

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Publish API
        run: dotnet publish api/Intex.Api/Intex.Api.csproj -c Release -o api_publish

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: "intex2-api-group11"
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_INTEX2_API_GROUP11 }}
          package: api_publish


name: Nightly ML Prediction Refresh

on:
  schedule:
    - cron: "15 6 * * *"
  workflow_dispatch:

concurrency:
  group: nightly-ml-predictions
  cancel-in-progress: false

jobs:
  refresh_predictions:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: read
    env:
      INTEX_ODBC: ${{ secrets.ML_INTEX_ODBC }}
      MPLBACKEND: Agg

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scripts/ml/requirements-nightly.txt

      - name: Verify SQL connection secret is present
        run: |
          if [ -z "$INTEX_ODBC" ]; then
            echo "ML_INTEX_ODBC secret is not configured."
            exit 1
          fi

      - name: Install Microsoft ODBC driver for SQL Server
        run: |
          sudo apt-get update
          sudo apt-get install -y curl gnupg ca-certificates lsb-release
          curl -fsSL https://packages.microsoft.com/keys/microsoft.asc | gpg --dearmor --batch --yes | sudo tee /usr/share/keyrings/microsoft-prod.gpg > /dev/null
          curl -fsSL https://packages.microsoft.com/config/ubuntu/$(lsb_release -rs)/prod.list | sudo tee /etc/apt/sources.list.d/mssql-release.list > /dev/null
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y msodbcsql18 unixodbc-dev

      - name: Install notebook dependencies
        run: python -m pip install --upgrade pip && pip install -r scripts/ml/requirements-nightly.txt

      - name: Execute committed ML notebooks
        run: |
          python scripts/ml/execute_notebooks.py \
            --repo-root . \
            --timeout-sec 3600 \
            --clean-exports

      - name: Replace ML predictions in SQL
        run: |
          python scripts/ml/import_ml_predictions_to_db.py \
            --connection-string "$INTEX_ODBC" \
            --input-dir output/ml-predictions \
            --odbc-driver "ODBC Driver 18 for SQL Server" \
            --expected-types \
              donor_lapse_90d \
              donor_upgrade_next_amount \
              next_channel_source \
              post_donation_value \
              safehouse_incident_next_month \
              resident_incident_30d \
              resident_reintegration_readiness

      - name: Upload executed notebooks and prediction exports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-ml-artifacts
          path: |
            tmp/executed-notebooks
            output/ml-predictions/*.json
